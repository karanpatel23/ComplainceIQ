name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_S3_BUCKET: ${{ secrets.TEST_S3_BUCKET }}
      TEST_S3_REGION: ${{ secrets.TEST_S3_REGION }}
      TEST_S3_ENDPOINT: ${{ secrets.TEST_S3_ENDPOINT }}
      TEST_S3_ACCESS_KEY_ID: ${{ secrets.TEST_S3_ACCESS_KEY_ID }}
      TEST_S3_SECRET_ACCESS_KEY: ${{ secrets.TEST_S3_SECRET_ACCESS_KEY }}
      TEST_S3_FORCE_PATH_STYLE: ${{ secrets.TEST_S3_FORCE_PATH_STYLE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run scan:claims
      - run: npm run scan:random

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
