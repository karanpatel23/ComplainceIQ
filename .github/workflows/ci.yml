name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run scan:claims
      - run: npm run scan:random

  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run qa:pilot

  postgres-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate live PostgreSQL
        if: env.TEST_DATABASE_URL != ''
        run: npm run validate:postgres
      - name: PostgreSQL validation not configured
        if: env.TEST_DATABASE_URL == ''
        run: echo "Skipped because TEST_DATABASE_URL is not configured."

  storage-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_S3_BUCKET: ${{ secrets.TEST_S3_BUCKET }}
      TEST_S3_REGION: ${{ secrets.TEST_S3_REGION }}
      TEST_S3_ENDPOINT: ${{ secrets.TEST_S3_ENDPOINT }}
      TEST_S3_ACCESS_KEY_ID: ${{ secrets.TEST_S3_ACCESS_KEY_ID }}
      TEST_S3_SECRET_ACCESS_KEY: ${{ secrets.TEST_S3_SECRET_ACCESS_KEY }}
      TEST_S3_FORCE_PATH_STYLE: ${{ secrets.TEST_S3_FORCE_PATH_STYLE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate live private storage
        if: env.TEST_S3_BUCKET != '' && env.TEST_S3_REGION != '' && env.TEST_S3_ACCESS_KEY_ID != '' && env.TEST_S3_SECRET_ACCESS_KEY != ''
        run: npm run validate:storage
      - name: Storage validation not configured
        if: env.TEST_S3_BUCKET == '' || env.TEST_S3_REGION == '' || env.TEST_S3_ACCESS_KEY_ID == '' || env.TEST_S3_SECRET_ACCESS_KEY == ''
        run: echo "Skipped because required TEST_S3 variables are not configured."

  scanner-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MALWARE_SCAN_ENABLED: "true"
      MALWARE_SCAN_REQUIRED_IN_PRODUCTION: "true"
      MALWARE_SCANNER_PROVIDER: clamav
      MALWARE_SCAN_FAIL_POLICY: closed
      CLAMAV_HOST: ${{ secrets.CLAMAV_HOST }}
      CLAMAV_PORT: ${{ secrets.CLAMAV_PORT }}
      CLAMAV_TIMEOUT_MS: ${{ secrets.CLAMAV_TIMEOUT_MS }}
      SCANNER_VALIDATE_EICAR: ${{ secrets.SCANNER_VALIDATE_EICAR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate live scanner
        if: env.CLAMAV_HOST != ''
        run: npm run validate:scanner
      - name: Scanner validation not configured
        if: env.CLAMAV_HOST == ''
        run: echo "Skipped because CLAMAV_HOST is not configured or reachable from CI."
